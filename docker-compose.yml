version: '3.8'

services:
  businesspilot-ai:
    build: .
    container_name: businesspilot-ai
    ports:
      - "8501:8501"
    env_file:
      - .env
    volumes:
      - ./data/reports:/app/data/reports
      - ./data/history:/app/data/history
      - ./data/uploads:/app/data/uploads
      - ./logs:/app/logs
    restart: unless-stopped
